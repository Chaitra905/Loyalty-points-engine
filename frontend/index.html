<!doctype html>
<html lang="en">

<head>

<meta charset="UTF-8" />

<meta name="viewport" 
content="width=device-width, initial-scale=1.0" />

<title>
Loyalty Points Engine
</title>


<style>

/* Basic Reset */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI", Arial, sans-serif;
}


body{

    min-height:100vh;

    background:#f4f6f9;

    color:#1f2937;

}



/* Header */

.header{

    background:#111827;

    color:white;

    padding:25px 50px;

    display:flex;

    justify-content:space-between;

    align-items:center;

}



.logo{

    font-size:26px;

    font-weight:700;

}


.tag{

    font-size:14px;

    color:#cbd5e1;

}



/* Main */

.main{

    width:90%;

    max-width:1200px;

    margin:40px auto;

}



/* Welcome */

.hero{

    background:white;

    padding:35px;

    border-radius:15px;

    box-shadow:0 8px 25px rgba(0,0,0,0.08);

    margin-bottom:30px;

}


.hero h1{

    font-size:32px;

    margin-bottom:10px;

}


.hero p{

    color:#64748b;

}



/* Cards */


.cards{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(280px,1fr));

    gap:25px;

}



.card{

    background:white;

    padding:25px;

    border-radius:15px;

    box-shadow:
    0 6px 20px rgba(0,0,0,0.08);

    transition:0.3s;

}



.card:hover{

    transform:translateY(-5px);

}



.card h2{

    margin-bottom:15px;

    color:#111827;

}



/* Inputs */


input{

    width:100%;

    padding:12px;

    margin:8px 0;

    border:1px solid #d1d5db;

    border-radius:8px;

    font-size:15px;

}


input:focus{

    outline:none;

    border-color:#2563eb;

}



/* Buttons */


button{

    width:100%;

    margin-top:12px;

    padding:12px;

    border:none;

    border-radius:8px;

    background:#2563eb;

    color:white;

    font-size:15px;

    font-weight:600;

    cursor:pointer;

    transition:0.3s;

}



button:hover{

    background:#1d4ed8;

}



/* Footer */


.footer{

    text-align:center;

    margin-top:40px;

    color:#64748b;

    font-size:14px;

}



</style>


</head>



<body>


<div id="root"></div>


<script type="module" src="/src/main.jsx"></script>


</body>


</html>
